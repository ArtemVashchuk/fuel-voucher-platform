# FuelFlow - Build, Test & Deploy to Azure
# Triggers: Push to main (build+test), Release tag (deploy)

name: Build, Test & Deploy

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to production'
        required: true
        type: boolean
        default: false
      skip_infra:
        description: 'Skip infrastructure deployment (deploy app only)'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '20'
  AZURE_WEBAPP_NAME: fuelflow-prod-app
  AZURE_RESOURCE_GROUP: fuelflow-prod-rg
  DOTNET_VERSION: '10.0.x'
  BACKEND_DIR: admin-panel/backend

jobs:
  # ============================================================================
  # BUILD & TEST
  # ============================================================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.BACKEND_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.BACKEND_DIR }}
        run: npm ci

      - name: Lint
        working-directory: ${{ env.BACKEND_DIR }}
        run: npm run lint --if-present

      - name: Type check
        working-directory: ${{ env.BACKEND_DIR }}
        run: npm run typecheck --if-present

      - name: Test
        working-directory: ${{ env.BACKEND_DIR }}
        run: npm test --if-present
        env:
          NODE_ENV: test

      - name: Build
        working-directory: ${{ env.BACKEND_DIR }}
        run: npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp ${{ env.BACKEND_DIR }}/dist/* deploy/ 2>/dev/null || true
          cp ${{ env.BACKEND_DIR }}/package.json deploy/
          cp ${{ env.BACKEND_DIR }}/package-lock.json deploy/
          cp -r ${{ env.BACKEND_DIR }}/drizzle deploy/ 2>/dev/null || true
          cp ${{ env.BACKEND_DIR }}/drizzle.config.ts deploy/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp
          path: deploy/
          retention-days: 7

  # ============================================================================
  # DEPLOY INFRASTRUCTURE (only on release or manual trigger)
  # ============================================================================
  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: build
    if: (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.deploy)) && !inputs.skip_infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: 'preview'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Install CDKTF CLI
        run: npm install -g cdktf-cli

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Azure credentials for Terraform
        run: |
          echo "ARM_CLIENT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .clientId)" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .clientSecret)" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .subscriptionId)" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r .tenantId)" >> $GITHUB_ENV

      - name: CDKTF Synth
        working-directory: ./infra
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          QR_ENCRYPTION_KEY: ${{ secrets.QR_ENCRYPTION_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: cdktf synth

      - name: Import existing resources (if needed)
        working-directory: ./infra/cdktf.out/stacks/fuelflow-prod
        continue-on-error: true
        run: |
          SUB="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          RG="fuelflow-prod-rg"
          KV="fuelflowprodkv"
          terraform init

          # Core resources
          terraform import "azurerm_resource_group.rg" "/subscriptions/${SUB}/resourceGroups/${RG}" || true
          terraform import "azurerm_key_vault.kv" "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.KeyVault/vaults/${KV}" || true
          terraform import "azurerm_log_analytics_workspace.logs" "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.OperationalInsights/workspaces/fuelflow-prod-logs" || true
          terraform import "azurerm_application_insights.insights" "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.Insights/components/fuelflow-prod-insights" || true
          terraform import "azurerm_postgresql_flexible_server.db" "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.DBforPostgreSQL/flexibleServers/fuelflow-prod-db" || true
          terraform import "azurerm_postgresql_flexible_server_database.db-fuelflow" "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.DBforPostgreSQL/flexibleServers/fuelflow-prod-db/databases/fuelflow" || true
          terraform import "azurerm_postgresql_flexible_server_firewall_rule.db-fw-azure" "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.DBforPostgreSQL/flexibleServers/fuelflow-prod-db/firewallRules/AllowAzureServices" || true
          terraform import "azurerm_service_plan.plan" "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.Web/serverfarms/fuelflow-prod-plan" || true
          terraform import "azurerm_linux_web_app.app" "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.Web/sites/fuelflow-prod-app" || true
          terraform import "azurerm_redis_cache.redis" "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.Cache/Redis/fuelflow-prod-redis" || true
          terraform import "azurerm_storage_account.storage" "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.Storage/storageAccounts/fuelflowprodstorage" || true
          terraform import "azurerm_storage_container.vouchers-container" "https://fuelflowprodstorage.blob.core.windows.net/vouchers" || true
          terraform import "azurerm_storage_container.uploads-container" "https://fuelflowprodstorage.blob.core.windows.net/uploads" || true

          # Key Vault secrets - need versioned IDs
          import_secret() {
            local tf_name=$1
            local secret_name=$2
            local secret_id=$(az keyvault secret show --vault-name ${KV} --name ${secret_name} --query id -o tsv 2>/dev/null)
            if [ -n "$secret_id" ]; then
              terraform import "azurerm_key_vault_secret.${tf_name}" "$secret_id" || true
            fi
          }
          import_secret "secret-postgres" "PostgresConnectionString"
          import_secret "secret-redis" "RedisConnectionString"
          import_secret "secret-storage" "StorageConnectionString"
          import_secret "secret-stripe-key" "StripeSecretKey"
          import_secret "secret-stripe-webhook" "StripeWebhookSecret"
          import_secret "secret-gemini" "GeminiApiKey"
          import_secret "secret-twilio-sid" "TwilioAccountSid"
          import_secret "secret-twilio-token" "TwilioAuthToken"
          import_secret "secret-twilio-phone" "TwilioPhoneNumber"
          import_secret "secret-session" "SessionSecret"
          import_secret "secret-qr-encryption" "QrEncryptionKey"

          # Monitoring
          terraform import "azurerm_monitor_action_group.alerts" "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.Insights/actionGroups/fuelflow-prod-alerts" || true
          terraform import "azurerm_monitor_metric_alert.alert-cpu" "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.Insights/metricAlerts/fuelflow-prod-alert-cpu" || true
          terraform import "azurerm_monitor_metric_alert.alert-memory" "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.Insights/metricAlerts/fuelflow-prod-alert-memory" || true
          terraform import "azurerm_monitor_metric_alert.alert-response" "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.Insights/metricAlerts/fuelflow-prod-alert-response" || true
          terraform import "azurerm_monitor_metric_alert.alert-5xx" "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.Insights/metricAlerts/fuelflow-prod-alert-5xx" || true
          terraform import "azurerm_monitor_metric_alert.alert-db" "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.Insights/metricAlerts/fuelflow-prod-alert-db" || true
          terraform import "azurerm_monitor_metric_alert.alert-redis" "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.Insights/metricAlerts/fuelflow-prod-alert-redis" || true

          # Role assignment - get existing ID first
          ROLE_ID=$(az role assignment list --scope "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.KeyVault/vaults/${KV}" --query "[?roleDefinitionName=='Key Vault Secrets User'].id" -o tsv | head -1)
          if [ -n "$ROLE_ID" ]; then
            terraform import "azurerm_role_assignment.kv-app-access" "$ROLE_ID" || true
          fi

      - name: CDKTF Deploy
        working-directory: ./infra
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          QR_ENCRYPTION_KEY: ${{ secrets.QR_ENCRYPTION_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: cdktf deploy --auto-approve

  # ============================================================================
  # DEPLOY APPLICATION
  # ============================================================================
  deploy-app:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: [build, deploy-infra]
    if: always() && (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.deploy)) && (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped')
    environment:
      name: production
      url: https://fuelflow-prod-app.azurewebsites.net

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp
          path: ./publish

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./publish

      - name: Health check
        run: |
          echo "Waiting for app to start (cold start + migrations)..."

          # Retry health check for up to 5 minutes (Node.js + migrations may take longer)
          for i in {1..30}; do
            response=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/health)

            if [ "$response" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi

            echo "Attempt $i: status $response, retrying in 10s..."
            sleep 10
          done

          echo "Health check failed after 5 minutes"
          exit 1

  # ============================================================================
  # NOTIFY
  # ============================================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: deploy-app
    if: always() && (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.deploy))

    steps:
      - name: Send deployment notification
        run: |
          if [ "${{ needs.deploy-app.result }}" = "success" ]; then
            STATUS="Deployment successful"
          else
            STATUS="Deployment failed"
          fi

          echo "$STATUS"
          echo "Version: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "App URL: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
