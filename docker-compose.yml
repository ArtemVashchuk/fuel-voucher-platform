version: '3.8'

services:
  admin-database:
    image: postgres:16-alpine
    container_name: fuel-admin-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fuel_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d fuel_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  admin-backend:
    build:
      context: ./admin-panel/backend
      dockerfile: Dockerfile
    container_name: fuel-admin-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@admin-database:5432/fuel_db
      PORT: 4000
      SESSION_SECRET: change-me-in-production
      GEMINI_API_KEY: AIzaSyCmOLHg50FwpJTCvEg-2kUDyHWc7GZC1Cw
      STRIPE_SECRET_KEY: sk_test_51SexbkPbEgMic3cbNoI1Et9bvCPQUkX8HM50WUbjnhcw4J0ydQmj6tTeaBZjztjYHcHuyg5DbmJNnUbVTLDKdQUg00Ia6zNYHa
      STRIPE_PUBLISHABLE_KEY: pk_test_51SexbkPbEgMic3cbeGOr1lHu5Q5VPDJvSvAzE8egMbg4FpLtQNfmTQqSQddeJIg3FL4VChD2b7aKjd4ZRsSrLBGT005Sxm2daw
      STRIPE_WEBHOOK_SECRET: whsec_placeholder_for_production
    ports:
      - "4000:4000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      admin-database:
        condition: service_healthy

  admin-frontend:
    build:
      context: ./admin-panel/frontend
      dockerfile: Dockerfile
    container_name: fuel-admin-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://admin-backend:4000
    ports:
      - "5002:5000"

  mobile-app:
    build:
      context: ./mobile-app
      dockerfile: Dockerfile
    container_name: fuel-mobile-app
    restart: unless-stopped
    environment:
      VITE_API_URL: http://admin-backend:4000
    ports:
      - "5001:5000"
    depends_on:
      - admin-backend

volumes:
  postgres_data:
  uploads_data:
