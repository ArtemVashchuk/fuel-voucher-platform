services:
  admin-database:
    image: postgres:16-alpine
    container_name: fuel-admin-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d fuel_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fuel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  admin-backend:
    build:
      context: ./admin-panel/backend
      dockerfile: Dockerfile
    container_name: fuel-admin-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${PORT}
      SESSION_SECRET: ${SESSION_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      MONOBANK_API_TOKEN: ${MONOBANK_API_TOKEN}
      MONOBANK_WEBHOOK_URL: ${MONOBANK_WEBHOOK_URL}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      REDIS_URL: redis://redis:6379
      QR_ENCRYPTION_KEY: ${QR_ENCRYPTION_KEY}
    ports:
      - "4000:4000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      admin-database:
        condition: service_healthy
      redis:
        condition: service_healthy

  dotnet-backend:
    build:
      context: ./fuel-flow-dotnet-backend
      dockerfile: src/FuelFlow.API/Dockerfile
    container_name: fuel-dotnet-backend
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - Database__ConnectionString=Host=admin-database;Port=5432;Database=fuel_db_dotnet;Username=postgres;Password=postgres;Trust Server Certificate=true;
    depends_on:
      admin-database:
        condition: service_healthy

  admin-frontend:
    build:
      context: ./admin-panel/frontend
      dockerfile: Dockerfile
    container_name: fuel-admin-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://admin-backend:4000
    ports:
      - "5002:5000"

  mobile-app-native:
    build:
      context: ./mobile-app-native
      dockerfile: Dockerfile
    container_name: fuel-mobile-app-native
    restart: unless-stopped
    environment:
      EXPO_PUBLIC_API_URL: http://localhost:5000
    ports:
      - "5003:5000"
    depends_on:
      - dotnet-backend

volumes:
  postgres_data:
  uploads_data:
