version: '3.8'

services:
  admin-database:
    image: postgres:16-alpine
    container_name: fuel-admin-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fuel_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d fuel_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  admin-backend:
    build:
      context: ./admin-panel/backend
      dockerfile: Dockerfile
    container_name: fuel-admin-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@admin-database:5432/fuel_db
      PORT: 4000
      SESSION_SECRET: change-me-in-production
      GEMINI_API_KEY: AIzaSyCmOLHg50FwpJTCvEg-2kUDyHWc7GZC1Cw
    ports:
      - "4000:4000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      admin-database:
        condition: service_healthy

  admin-frontend:
    build:
      context: ./admin-panel/frontend
      dockerfile: Dockerfile
    container_name: fuel-admin-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://admin-backend:4000
    ports:
      - "5002:5000"

  mobile-app:
    build:
      context: ./mobile-app
      dockerfile: Dockerfile
    container_name: fuel-mobile-app
    restart: unless-stopped
    environment:
      VITE_API_URL: http://admin-backend:4000
    ports:
      - "5000:5000"

volumes:
  postgres_data:
  uploads_data:
