services:
  admin-database:
    image: postgres:16-alpine
    container_name: fuel-admin-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d fuel_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fuel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  dotnet-backend:
    build:
      context: ./backend
      dockerfile: src/FuelFlow.API/Dockerfile
    container_name: fuel-dotnet-backend
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - Database__ConnectionString=Host=admin-database;Port=5432;Database=fuel_db_dotnet;Username=postgres;Password=postgres;Trust Server Certificate=true;
      - Monobank__Token=${MONOBANK_API_TOKEN}
      - Monobank__WebhookUrl=${MONOBANK_WEBHOOK_URL}
      - Monobank__Enabled=true
      - Monobank__BaseUrl=https://api.monobank.ua
      - Monobank__RedirectUrl=fuelflow://payment-result
    depends_on:
      admin-database:
        condition: service_healthy

  admin-frontend:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: fuel-admin-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://dotnet-backend:8080
    ports:
      - "5002:5000"
    depends_on:
      - dotnet-backend

  mobile-app:
    build:
      context: ./mobile
      dockerfile: Dockerfile
    container_name: fuel-mobile-app
    restart: unless-stopped
    environment:
      EXPO_PUBLIC_API_URL: http://dotnet-backend:8080
    ports:
      - "5003:5000"
    depends_on:
      - dotnet-backend

volumes:
  postgres_data:
