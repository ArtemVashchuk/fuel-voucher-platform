version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lemberg-fuel-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lemberg_fuel}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-lemberg_fuel}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: lemberg-fuel-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-lemberg_fuel}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  admin:
    build:
      context: .
      dockerfile: admin-app/Dockerfile
    container_name: lemberg-fuel-admin
    restart: unless-stopped
    environment:
      VITE_API_URL: http://backend:5000
    ports:
      - "5001:80"
    depends_on:
      - backend

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: lemberg-fuel-migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-lemberg_fuel}
    command: npm run db:push
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
