version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lemberg-fuel-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lemberg_fuel}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-lemberg_fuel}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  ocr_service:
    build:
      context: ./python_services
      dockerfile: Dockerfile
    container_name: lemberg-fuel-ocr
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./python_services/.easyocr_models:/app/.easyocr_models

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: lemberg-fuel-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-lemberg_fuel}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OCR_SERVICE_URL: http://ocr_service:8000
      OLLAMA_HOST: http://ollama:11434
      PORT: 5000
    ports:
      - "5000:5000"
    volumes:
      # Mount only specific directories for hot-reloading (preserve /app/server/public)
      - ./server/services:/app/server/services
      - ./shared:/app/shared
    depends_on:
      postgres:
        condition: service_healthy
      ocr_service:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 3

  admin:
    build:
      context: .
      dockerfile: admin-app/Dockerfile
    container_name: lemberg-fuel-admin
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - "5001:80"
    depends_on:
      - backend

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: lemberg-fuel-migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-lemberg_fuel}
    command: npm run db:push
    volumes:
      - ./shared:/app/shared
    depends_on:
      postgres:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: lemberg-fuel-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  ollama-setup:
    image: ollama/ollama:latest
    container_name: lemberg-fuel-ollama-setup
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: /bin/sh
    command: -c "echo 'Waiting for Ollama...'; for i in $(seq 1 10); do if ollama list > /dev/null 2>&1; then break; fi; echo 'Retrying...'; sleep 5; done; echo 'Pulling moondream...'; ollama pull moondream"

volumes:
  postgres_data:
  ollama_data:
