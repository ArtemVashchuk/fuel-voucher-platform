services:
  # Backend API
  - type: web
    name: fuel-admin-backend
    runtime: node
    repo: https://github.com/ArtemVashchuk/FuelFlow
    rootDir: admin-panel/backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SMS_PROVIDER
        value: dev  # Change to 'twilio' when real SMS is needed (requires TWILIO_* secrets)
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: QR_ENCRYPTION_KEY
        sync: false
      - key: MONOBANK_API_TOKEN
        sync: false
      - key: MONOBANK_WEBHOOK_URL
        sync: false
