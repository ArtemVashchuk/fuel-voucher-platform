services:
  # Backend
  - type: web
    name: fuel-admin-backend
    runtime: node
    repo: https://github.com/ArtemVashchuk/FuelFlow # NOTE: User will need to update this if repo name differs
    rootDir: admin-panel/backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: development  # Dev mode for static 000000 auth code
      - key: SMS_PROVIDER
        value: dev  # No external SMS service needed
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false  
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: DATABASE_URL
        sync: false # User must provide this in dashboard
      - key: REDIS_URL
        sync: false # User must provide this in dashboard
      - key: SESSION_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        value: "sk_test_dummy_key_for_render_boot"
      - key: TWILIO_ACCOUNT_SID
        value: "AC_dummy_sid_for_render_boot"
