services:
  # .NET Backend API
  - type: web
    name: fuel-dotnet-backend
    runtime: docker
    repo: https://github.com/ArtemVashchuk/fuel-voucher-platform
    rootDir: fuel-flow-dotnet-backend
    dockerfilePath: src/FuelFlow.API/Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: Database__ConnectionString
        sync: false
      # Set Database__ConnectionString in Render dashboard to your
      # Supabase DATABASE_URL. Format:
      #   postgresql://USER:PASSWORD@HOST:PORT/postgres
      # URL-encode special chars in the password:
      #   '!'  => '%21'
      #   '&'  => '%26'
      #   '#'  => '%23'
      #   '+'  => '%2B'
      # Existing Supabase project used by Node backend (URL-encoded):
      # postgresql://postgres.dfrjclroguyipgikekff:s.yQn7n6%21GWBK%26Y@aws-1-eu-west-1.pooler.supabase.com:6543/postgres
      - key: Jwt__Secret
        generateValue: true
      - key: Jwt__Issuer
        value: FuelFlow
      - key: Jwt__Audience
        value: FuelFlow
      - key: Jwt__AccessTokenExpirationMinutes
        value: "15"
      - key: Jwt__RefreshTokenExpirationDays
        value: "7"
      - key: DeviceAuth__Enabled
        value: "true"
      - key: DeviceAuth__AllowDevelopmentBypass
        value: "false"
      - key: DeviceAuth__RequireSignatureForEndpoints__0
        value: "/api/orders/checkout"
      - key: DeviceAuth__RequireSignatureForEndpoints__1
        value: "/api/auth/device/*"
      - key: Monobank__Token
        sync: false
      - key: Monobank__WebhookUrl
        sync: false
      - key: Monobank__Enabled
        value: "true"
      - key: Monobank__BaseUrl
        value: https://api.monobank.ua
      - key: Monobank__RedirectUrl
        value: fuelflow://payment-result
      - key: Monobank__PublicKey
        sync: false
      # Database is hosted on Supabase (shared with the Node backend
      # in the same Supabase project). Set DATABASE_URL via the
      # Database__ConnectionString env var above, NOT via a
      # databases: block at the bottom of this file.
      - key: RunMigrationsOnBoot
        value: "false"
