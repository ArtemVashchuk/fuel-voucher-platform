<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stripe Payment Test - Fuel Flow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .status {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .package {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .package-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .package-row:last-child {
            margin-bottom: 0;
            padding-top: 10px;
            border-top: 2px solid #dee2e6;
            font-weight: bold;
            font-size: 18px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 13px;
            max-height: 300px;
            overflow-y: auto;
        }

        .hidden {
            display: none;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🚗 Fuel Flow Payment Test</h1>
        <p class="subtitle">Test your Stripe integration</p>

        <div id="status" class="status info">
            <strong>Status:</strong> Ready to test
        </div>

        <div class="package">
            <div class="package-row">
                <span>Station:</span>
                <strong>OKKO</strong>
            </div>
            <div class="package-row">
                <span>Fuel Type:</span>
                <strong>Diesel Euro</strong>
            </div>
            <div class="package-row">
                <span>Amount:</span>
                <strong>10 Liters</strong>
            </div>
            <div class="package-row">
                <span>Total:</span>
                <strong>500 UAH</strong>
            </div>
        </div>

        <button id="testBtn" onclick="runTest()">
            🧪 Run Payment Test
        </button>

        <div id="result" class="result hidden"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:4000';

        async function runTest() {
            const btn = document.getElementById('testBtn');
            const status = document.getElementById('status');
            const result = document.getElementById('result');

            btn.disabled = true;
            btn.innerHTML = '<div class="loader"></div> Testing...';
            result.classList.add('hidden');

            let log = '';

            try {
                // Step 1: Check Stripe Config
                log += '1️⃣ Checking Stripe configuration...\n';
                status.className = 'status info';
                status.innerHTML = '<strong>Step 1/3:</strong> Checking Stripe configuration...';

                const configRes = await fetch(`${API_URL}/api/stripe/config`);
                const config = await configRes.json();

                if (!config.publishableKey || !config.publishableKey.startsWith('pk_test_')) {
                    throw new Error('Stripe not configured. Please restart your backend!');
                }

                log += `✅ Stripe configured: ${config.publishableKey.substring(0, 20)}...\n\n`;

                // Step 2: Create Purchase
                log += '2️⃣ Creating test purchase...\n';
                status.innerHTML = '<strong>Step 2/3:</strong> Creating purchase...';

                const purchaseRes = await fetch(`${API_URL}/api/checkout`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        packageId: 'test-pkg-1',
                        stationId: 'station-okko-1',
                        stationName: 'OKKO',
                        fuelType: 'diesel',
                        fuelName: 'Diesel Euro',
                        liters: 10,
                        price: 500
                    })
                });

                const purchase = await purchaseRes.json();

                if (!purchase.purchaseId) {
                    throw new Error('Failed to create purchase: ' + JSON.stringify(purchase));
                }

                log += `✅ Purchase created: ID ${purchase.purchaseId}\n\n`;

                // Step 3: Simulate Payment
                log += '3️⃣ Simulating payment...\n';
                status.innerHTML = '<strong>Step 3/3:</strong> Processing payment...';

                const paymentRes = await fetch(`${API_URL}/api/payments/simulate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        purchaseId: purchase.purchaseId,
                        scenario: 'success'
                    })
                });

                const paymentResult = await paymentRes.json();

                if (paymentResult.status === 'success') {
                    log += '✅ Payment successful!\n\n';
                    log += '📦 Purchase Details:\n';
                    log += JSON.stringify(paymentResult.purchase, null, 2);

                    status.className = 'status success';
                    status.innerHTML = '<strong>✅ Success!</strong> Payment processed successfully';
                } else {
                    throw new Error('Payment failed: ' + JSON.stringify(paymentResult));
                }

            } catch (error) {
                log += `\n❌ Error: ${error.message}\n`;
                status.className = 'status error';
                status.innerHTML = `<strong>❌ Error:</strong> ${error.message}`;
            }

            result.textContent = log;
            result.classList.remove('hidden');
            btn.disabled = false;
            btn.innerHTML = '🔄 Run Test Again';
        }
    </script>
</body>

</html>
